name: Build My Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout my firmware
      uses: actions/checkout@v4
      with:
        path: firmware

    - name: Install ESP-IDF
      run: |
        sudo apt update
        sudo apt install -y git wget flex bison gperf python3 python3-pip cmake ninja-build ccache libffi-dev libssl-dev dfu-util
        mkdir -p ~/esp
        cd ~/esp
        git clone --recursive https://github.com/espressif/esp-idf.git -b v5.5
        cd esp-idf
        ./install.sh esp32c3
        echo "source ~/esp/esp-idf/export.sh" >> ~/.bashrc

    - name: Build
      run: |
        source ~/esp/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/firmware
        idf.py set-target esp32c3
        idf.py build
        
        # Создаём объединённый образ для прошивки на 0x0000
        cd build
        esptool.py --chip esp32c3 merge_bin \
          -o merged_firmware.bin \
          --flash_mode dio \
          --flash_size 4MB \
          0x0000 bootloader/bootloader.bin \
          0x8000 partition_table/partition-table.bin \
          0x10000 xiaozhi.bin \
          0x280000 generated_assets.bin \
          0xd000 ota_data_initial.bin

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: ${{ github.workspace }}/firmware/build/merged_firmware.bin
