name: Build Xiaozhi C3 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: Franklnir/xiaozhi-AI-esp32c3-mini
        path: firmware

    - name: Install ESP-IDF
      run: |
        sudo apt update
        sudo apt install -y git wget flex bison gperf python3 python3-pip cmake ninja-build ccache libffi-dev libssl-dev dfu-util
        mkdir -p ~/esp
        cd ~/esp
        git clone --recursive https://github.com/espressif/esp-idf.git -b v5.5
        cd esp-idf
        ./install.sh esp32c3
        echo "source ~/esp/esp-idf/export.sh" >> ~/.bashrc

    - name: Configure and fix pins
      run: |
        source ~/esp/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/firmware
        
        # Копируем таблицу разделов v2
        cp partitions/v2/4m.csv partitions.csv
        
        # Заменяем пины в исходниках (main.cc или config.h)
        # Ищем и меняем все стандартные пины на ваши
        find main -type f \( -name "*.cc" -o -name "*.h" -o -name "*.cpp" \) -exec sed -i \
          -e 's/GPIO_NUM_5/GPIO_NUM_99/g' \
          -e 's/GPIO_NUM_6/GPIO_NUM_98/g' \
          -e 's/GPIO_NUM_4/GPIO_NUM_97/g' \
          -e 's/GPIO_NUM_8/GPIO_NUM_96/g' \
          -e 's/GPIO_NUM_9/GPIO_NUM_95/g' \
          -e 's/GPIO_NUM_3/GPIO_NUM_94/g' {} +
        
        # OLED SDA=5, SCL=4
        find main -type f \( -name "*.cc" -o -name "*.h" -o -name "*.cpp" \) -exec sed -i \
          -e 's/GPIO_NUM_99/GPIO_NUM_5/g' \
          -e 's/GPIO_NUM_98/GPIO_NUM_4/g' \
          -e 's/GPIO_NUM_97/GPIO_NUM_8/g' \
          -e 's/GPIO_NUM_96/GPIO_NUM_1/g' \
          -e 's/GPIO_NUM_95/GPIO_NUM_2/g' \
          -e 's/GPIO_NUM_94/GPIO_NUM_10/g' {} +
        
        # Кнопка GPIO 9
        find main -type f \( -name "*.cc" -o -name "*.h" -o -name "*.cpp" \) -exec sed -i \
          -e 's/GPIO_NUM_3/GPIO_NUM_9/g' {} +
        
        # Динамик BCLK=7, LRC=3, DIN=6
        find main -type f \( -name "*.cc" -o -name "*.h" -o -name "*.cpp" \) -exec sed -i \
          -e 's/GPIO_NUM_5/GPIO_NUM_7/g' \
          -e 's/GPIO_NUM_6/GPIO_NUM_6/g' {} +
        
        # Новостной сервер
        echo "CONFIG_NEWS_API_URL=\"http://x9262592.beget.tech/tin-moi-nhat\"" >> sdkconfig.defaults.esp32c3

    - name: Build
      run: |
        source ~/esp/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/firmware
        idf.py set-target esp32c3
        idf.py build

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: ${{ github.workspace }}/firmware/build/*.bin
