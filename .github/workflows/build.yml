name: Build Xiaozhi C3 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: Franklnir/xiaozhi-AI-esp32c3-mini
        path: firmware

    - name: Install ESP-IDF
      run: |
        sudo apt update
        sudo apt install -y git wget flex bison gperf python3 python3-pip cmake ninja-build ccache libffi-dev libssl-dev dfu-util
        mkdir -p ~/esp
        cd ~/esp
        git clone --recursive https://github.com/espressif/esp-idf.git -b v5.5
        cd esp-idf
        ./install.sh esp32c3
        echo "source ~/esp/esp-idf/export.sh" >> ~/.bashrc

    - name: Configure
      run: |
        source ~/esp/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/firmware
        
        # Копируем таблицу разделов v2
        cp partitions/v2/4m.csv partitions.csv
        
        # Копируем правильный board_config.h с вашими пинами
        cat > main/boards/esp32c3-inmp441/config.h << 'EOF'
        #ifndef _BOARD_CONFIG_H_
        #define _BOARD_CONFIG_H_
        #include <driver/gpio.h>
        #define AUDIO_INPUT_SAMPLE_RATE  24000
        #define AUDIO_OUTPUT_SAMPLE_RATE 24000
        #define AUDIO_I2S_GPIO_WS   GPIO_NUM_2
        #define AUDIO_I2S_GPIO_BCLK GPIO_NUM_1
        #define AUDIO_I2S_GPIO_DIN  GPIO_NUM_10
        #define AUDIO_I2S_GPIO_DOUT GPIO_NUM_6
        #define BOOT_BUTTON_GPIO    GPIO_NUM_9
        #define RESET_SSID_BUTTON_GPIO GPIO_NUM_NC
        #define RESET_SSID_LONG_PRESS_MS 5000
        #define HANDS_FREE_AUTO_LISTEN              1
        #define HANDS_FREE_AUTO_LISTEN_INTERVAL_MS  500
        #define HANDS_FREE_AUTO_LISTEN_RETRY_MS     5000
        #define HANDS_FREE_IDLE_TIMEOUT_MS          30000
        #define HANDS_FREE_WAKE_WORD_HINT           "Hi Jason"
        #define BUILTIN_LED_GPIO    GPIO_NUM_NC
        #define DISPLAY_SDA_PIN     GPIO_NUM_5
        #define DISPLAY_SCL_PIN     GPIO_NUM_4
        #define DISPLAY_WIDTH       128
        #define DISPLAY_HEIGHT      64
        #define DISPLAY_MIRROR_X    true
        #define DISPLAY_MIRROR_Y    true
        #endif
        EOF
        
        # Новостной сервер
        echo "CONFIG_NEWS_API_URL=\"http://x9262592.beget.tech/tin-moi-nhat\"" >> sdkconfig.defaults.esp32c3

    - name: Build
      run: |
        source ~/esp/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/firmware
        idf.py set-target esp32c3
        idf.py build

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: ${{ github.workspace }}/firmware/build/*.bin
