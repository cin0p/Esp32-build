name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.1
    steps:
    - name: Checkout xiaozhi-esp32
      uses: actions/checkout@v4
      with:
        repository: 78/xiaozhi-esp32
        path: xiaozhi-esp32

    - name: Configure
      run: |
        cd xiaozhi-esp32
        echo "CONFIG_I2C_MASTER_SDA=21" >> sdkconfig.defaults
        echo "CONFIG_I2C_MASTER_SCL=22" >> sdkconfig.defaults
        echo "CONFIG_OLED_I2C_ADDRESS=0x3C" >> sdkconfig.defaults
        echo "CONFIG_TOUCH_BUTTON_ENABLED=y" >> sdkconfig.defaults
        echo "CONFIG_MIC_ENABLED=y" >> sdkconfig.defaults
        echo "CONFIG_WIFI_AP_MODE=y" >> sdkconfig.defaults
        echo "CONFIG_NEWS_API_URL=\"http://x9262592.beget.tech/tin-moi-nhat\"" >> sdkconfig.defaults

    - name: Build
      run: |
        cd xiaozhi-esp32
        idf.py set-target esp32c3
        idf.py build

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: xiaozhi-esp32/build/*.bin
